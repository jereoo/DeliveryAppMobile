# Phase 1: Frontend CI - Test and build Expo web for Vercel deployment
name: Phase 1 Frontend CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm run test:ci
        continue-on-error: true

  build-web:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: .

    env:
      EXPO_PUBLIC_BACKEND_URL: https://deliveryapp-api.herokuapp.com/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Expo web
        run: npx expo export -p web
        env:
          CI: "true"

      - name: Verify build output
        run: |
          if [ -d dist ]; then
            echo "✅ Build successful - dist/ exists"
            ls -la dist/
          else
            echo "❌ dist/ not found"
            exit 1
          fi
