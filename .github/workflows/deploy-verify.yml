# Verify Vercel auto-deploy after CI passes on main.
# Fails loudly if production does not receive the commit (catches silent deploy gaps).
name: Verify Vercel Deploy

on:
  workflow_run:
    workflows: [Phase 1 Frontend CI]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

env:
  PRODUCTION_WEB: https://deliveryapp-mobile.vercel.app
  POLL_SECONDS: 30
  TIMEOUT_MINUTES: 20

jobs:
  verify:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write

    steps:
      - name: Require Vercel credentials
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          missing=0
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN secret is not set."
            echo "Create at: https://vercel.com/account/settings/tokens"
            missing=1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::VERCEL_PROJECT_ID secret is not set."
            echo "Find in Vercel → Project → Settings → General → Project ID"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then exit 1; fi

      - name: Wait for Vercel deployment and verify production
        id: verify
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          COMMIT_SHA: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + TIMEOUT_MINUTES * 60 ))
          deploy_state=""
          deploy_url=""

          echo "Waiting for Vercel project ${VERCEL_PROJECT_ID} to deploy commit ${COMMIT_SHA:0:7}..."

          while [ "$(date +%s)" -lt "$deadline" ]; do
            response=$(curl -fsS \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&limit=15")

            deploy_state=$(echo "$response" | jq -r --arg sha "$COMMIT_SHA" \
              '[.deployments[] | select(.meta.githubCommitSha == $sha)] | .[0].readyState // empty')
            deploy_url=$(echo "$response" | jq -r --arg sha "$COMMIT_SHA" \
              '[.deployments[] | select(.meta.githubCommitSha == $sha)] | .[0].url // empty')

            if [ "$deploy_state" = "ERROR" ] || [ "$deploy_state" = "CANCELED" ]; then
              echo "result=failed" >> "$GITHUB_OUTPUT"
              echo "detail=Vercel deployment ${deploy_state} for ${COMMIT_SHA:0:7}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "$deploy_state" = "READY" ]; then
              echo "Deployment ready: ${deploy_url}"
              break
            fi

            echo "No READY deployment yet (state=${deploy_state:-none}) — retry in ${POLL_SECONDS}s"
            sleep "$POLL_SECONDS"
          done

          if [ "$deploy_state" != "READY" ]; then
            echo "result=timeout" >> "$GITHUB_OUTPUT"
            echo "detail=No READY Vercel deployment for ${COMMIT_SHA:0:7} within ${TIMEOUT_MINUTES} minutes" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          web_code=$(curl -s -o /dev/null -w "%{http_code}" "${PRODUCTION_WEB}/" || true)
          if [ "$web_code" != "200" ]; then
            echo "result=smoke_failed" >> "$GITHUB_OUTPUT"
            echo "detail=Deploy READY but ${PRODUCTION_WEB} returned HTTP ${web_code}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "result=success" >> "$GITHUB_OUTPUT"
          echo "detail=Vercel production READY; ${PRODUCTION_WEB} returned 200" >> "$GITHUB_OUTPUT"

      - name: Set commit status
        if: always()
        uses: actions/github-script@v7
        env:
          VERIFY_RESULT: ${{ steps.verify.outputs.result }}
          VERIFY_DETAIL: ${{ steps.verify.outputs.detail }}
          COMMIT_SHA: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
        with:
          script: |
            const result = process.env.VERIFY_RESULT || 'failed';
            const detail = process.env.VERIFY_DETAIL || 'Deploy verification did not complete';
            const sha = process.env.COMMIT_SHA;
            const state = result === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              context: 'deploy/vercel-production',
              description: detail.slice(0, 140),
              target_url: 'https://vercel.com/jereoos-projects/deliveryapp-mobile/deployments',
            });

      - name: Notify webhook (optional)
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_NOTIFY_WEBHOOK_URL }}
          VERIFY_RESULT: ${{ steps.verify.outputs.result }}
          VERIFY_DETAIL: ${{ steps.verify.outputs.detail }}
          COMMIT_SHA: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then exit 0; fi
          emoji="✅"
          title="Mobile deploy verified"
          if [ "$VERIFY_RESULT" != "success" ]; then
            emoji="❌"
            title="Mobile deploy FAILED"
          fi
          payload=$(jq -n \
            --arg text "${emoji} ${title}: \`${COMMIT_SHA:0:7}\` — ${VERIFY_DETAIL}" \
            '{text: $text}')
          curl -fsS -X POST -H "Content-Type: application/json" -d "$payload" "$WEBHOOK_URL"

      - name: Fail if deploy not verified
        if: steps.verify.outputs.result != 'success'
        run: |
          echo "::error::${{ steps.verify.outputs.detail }}"
          echo "Manual deploy: Vercel → Deployments → Create Deployment → enter \`main\`"
          exit 1

  ci-failed-notify:
    if: >-
      github.event.workflow_run.conclusion != 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Notify deploy blocked by CI
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_NOTIFY_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          msg="⚠️ Mobile deploy blocked: CI ${CONCLUSION} on \`${COMMIT_SHA:0:7}\`. Vercel may not deploy until CI is green."
          echo "$msg"
          if [ -n "$WEBHOOK_URL" ]; then
            curl -fsS -X POST -H "Content-Type: application/json" \
              -d "$(jq -n --arg text "$msg" '{text: $text}')" "$WEBHOOK_URL" || true
          fi
